# Nginx + Let's Encrypt for CRM and Store.
# On server: copy to /etc/nginx/sites-available/, symlink to sites-enabled,
# run certbot, reload nginx. See deploy/nginx/README.md

# CRM — crm.suprex.dental → web (3000)
server {
    listen 80;
    server_name crm.suprex.dental;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Store — www.suprex.dental → store (3002)
server {
    listen 80;
    server_name www.suprex.dental;
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
